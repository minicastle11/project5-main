server:
  port: 8080

spring:
  application:
    name: miniproject5-backend
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:file:./data/bookdb;MODE=MySQL;DATABASE_TO_UPPER=false
    username: sa
    password: 1234
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
